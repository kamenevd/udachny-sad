# Задача A.5 — nginx-проксирование PocketBase на pb.kdnfx.space.
#
# TODO(ручной деплой): скопировать на LXC с nginx (не обязательно 108),
# симлинк в /etc/nginx/sites-enabled/, выпустить сертификат
# (certbot --nginx -d pb.kdnfx.space) и перезагрузить nginx.
# У Claude нет SSH-доступа к серверу — файл подготовлен, но не применён.

server {
    listen 80;
    listen [::]:80;
    server_name pb.kdnfx.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pb.kdnfx.space;

    # ssl_certificate     /etc/letsencrypt/live/pb.kdnfx.space/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pb.kdnfx.space/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://192.168.3.59:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — фронтенд на udacha.kdnfx.space обращается к API напрямую.
        add_header Access-Control-Allow-Origin "https://udacha.kdnfx.space" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }

        # PocketBase realtime (SSE) — не буферизовать.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
